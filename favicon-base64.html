<!DOCTYPE html>
<html>
<head>
<title>Base64 Favicon Generator</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
.favicon-preview { 
  width: 32px; 
  height: 32px; 
  border: 1px solid #ccc;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<h1>TutorNoble Favicon Preview</h1>

<!-- Simple 16x16 favicon design -->
<canvas id="favicon" width="16" height="16"></canvas>

<script>
const canvas = document.getElementById('favicon');
const ctx = canvas.getContext('2d');

// Forest green background
ctx.fillStyle = '#0D3D2A';
ctx.fillRect(0, 0, 16, 16);

// Gold stripe pattern (kente-inspired)
ctx.fillStyle = '#C07D2A';
ctx.fillRect(0, 0, 16, 2);
ctx.fillRect(0, 14, 16, 2);

// TN letters in gold
ctx.fillStyle = '#C07D2A';
ctx.font = 'bold 8px Arial';
ctx.textAlign = 'center';
ctx.fillText('TN', 8, 10);

// Convert to base64
const dataURL = canvas.toDataURL('image/png');
console.log('Base64 favicon:', dataURL);

// Create download link
const link = document.createElement('a');
link.download = 'favicon-16x16.png';
link.href = dataURL;
link.textContent = 'Download 16x16 PNG';
document.body.appendChild(link);

document.body.appendChild(document.createElement('br'));
document.body.appendChild(document.createElement('br'));

// Show preview
const preview = document.createElement('img');
preview.src = dataURL;
preview.className = 'favicon-preview';
document.body.appendChild(preview);

// Also create 32x32 version
const canvas32 = document.createElement('canvas');
canvas32.width = 32;
canvas32.height = 32;
const ctx32 = canvas32.getContext('2d');

// Scale up the design
ctx32.fillStyle = '#0D3D2A';
ctx32.fillRect(0, 0, 32, 32);

ctx32.fillStyle = '#C07D2A';
ctx32.fillRect(0, 0, 32, 4);
ctx32.fillRect(0, 28, 32, 4);

ctx32.fillStyle = '#C07D2A';
ctx32.font = 'bold 16px Arial';
ctx32.textAlign = 'center';
ctx32.fillText('TN', 16, 20);

const dataURL32 = canvas32.toDataURL('image/png');
console.log('32x32 Base64 favicon:', dataURL32);

const link32 = document.createElement('a');
link32.download = 'favicon-32x32.png';
link32.href = dataURL32;
link32.textContent = 'Download 32x32 PNG';
document.body.appendChild(link32);

document.body.appendChild(document.createElement('br'));

const preview32 = document.createElement('img');
preview32.src = dataURL32;
preview32.style.width = '32px';
preview32.style.height = '32px';
preview32.style.border = '1px solid #ccc';
document.body.appendChild(preview32);
</script>
</body>
</html>
