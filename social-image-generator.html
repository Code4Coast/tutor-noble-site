<!DOCTYPE html>
<html>
<head>
<title>TutorNoble Social Image Generator</title>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
.container { max-width: 800px; margin: 0 auto; }
canvas { border: 1px solid #ccc; margin: 20px 0; }
.controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
button { background: #0D3D2A; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
button:hover { background: #1A5C3E; }
</style>
</head>
<body>
<div class="container">
<h1>TutorNoble Minimal Social Image Generator</h1>
<p>Creates a modern, minimal 1200x630px image for WhatsApp/Facebook sharing</p>

<div class="controls">
<button onclick="generateImage()">Generate Social Image</button>
<button onclick="downloadImage()">Download Image</button>
</div>

<canvas id="socialCanvas" width="1200" height="630"></canvas>
</div>

<script>
const canvas = document.getElementById('socialCanvas');
const ctx = canvas.getContext('2d');

function generateImage() {
    // Clean minimal background
    ctx.fillStyle = '#F9F5EE'; // Cream background
    ctx.fillRect(0, 0, 1200, 630);
    
    // Subtle forest green accent bar
    ctx.fillStyle = '#0D3D2A';
    ctx.fillRect(0, 0, 1200, 8);
    ctx.fillRect(0, 622, 1200, 8);
    
    // Center content area with subtle shadow
    ctx.fillStyle = 'rgba(13, 61, 42, 0.03)';
    ctx.fillRect(100, 80, 1000, 470);
    
    // Main brand - centered and clean
    ctx.fillStyle = '#0D3D2A';
    ctx.font = 'bold 64px Playfair Display';
    ctx.textAlign = 'center';
    ctx.fillText('TutorNoble', 600, 200);
    
    // Minimal tagline
    ctx.fillStyle = '#C07D2A';
    ctx.font = 'italic 28px Playfair Display';
    ctx.fillText('Learn. Grow. Shine.', 600, 240);
    
    // Clean separator line
    ctx.strokeStyle = '#E0D5C5';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(300, 280);
    ctx.lineTo(900, 280);
    ctx.stroke();
    
    // Core services - minimal text
    ctx.fillStyle = '#4A3728';
    ctx.font = '22px Plus Jakarta Sans';
    ctx.fillText('English & Science Tutoring', 600, 330);
    
    ctx.fillStyle = '#7A6858';
    ctx.font = '18px Plus Jakarta Sans';
    ctx.fillText('JHS 1–3 • Online & In-Person', 600, 360);
    
    // Location and pricing
    ctx.fillStyle = '#7A6858';
    ctx.font = '16px Plus Jakarta Sans';
    ctx.fillText('Sunyani, Ghana • From ₵15/session', 600, 400);
    
    // Clean call to action
    ctx.fillStyle = '#0D3D2A';
    ctx.fillRect(400, 440, 400, 60);
    
    ctx.fillStyle = '#F9F5EE';
    ctx.font = 'bold 20px Plus Jakarta Sans';
    ctx.fillText('Book Now', 600, 478);
    
    // Website URL - minimal
    ctx.fillStyle = '#C07D2A';
    ctx.font = '16px Plus Jakarta Sans';
    ctx.fillText('tutor-noble.netlify.app', 600, 540);
    
    // Subtle brand element - small circle
    ctx.fillStyle = '#C07D2A';
    ctx.beginPath();
    ctx.arc(120, 120, 25, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#F9F5EE';
    ctx.beginPath();
    ctx.arc(120, 120, 18, 0, Math.PI * 2);
    ctx.fill();
    
    // TN letters in circle
    ctx.fillStyle = '#0D3D2A';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('TN', 120, 126);
}

function downloadImage() {
    const link = document.createElement('a');
    link.download = 'social-image.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click();
}

// Add roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
        if (width < 2 * radius) radius = width / 2;
        if (height < 2 * radius) radius = height / 2;
        this.beginPath();
        this.moveTo(x + radius, y);
        this.arcTo(x + width, y, x + width, y + height, radius);
        this.arcTo(x + width, y + height, x, y + height, radius);
        this.arcTo(x, y + height, x, y, radius);
        this.arcTo(x, y, x + width, y, radius);
        this.closePath();
        return this;
    };
}

// Generate on load
window.onload = generateImage;
</script>
</body>
</html>
