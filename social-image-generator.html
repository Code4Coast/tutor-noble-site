<!DOCTYPE html>
<html>
<head>
<title>TutorNoble Social Image Generator</title>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
.container { max-width: 800px; margin: 0 auto; }
canvas { border: 1px solid #ccc; margin: 20px 0; }
.controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
button { background: #0D3D2A; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
button:hover { background: #1A5C3E; }
</style>
</head>
<body>
<div class="container">
<h1>TutorNoble Social Media Image Generator</h1>
<p>Creates a 1200x630px image for WhatsApp/Facebook sharing</p>

<div class="controls">
<button onclick="generateImage()">Generate Social Image</button>
<button onclick="downloadImage()">Download Image</button>
</div>

<canvas id="socialCanvas" width="1200" height="630"></canvas>
</div>

<script>
const canvas = document.getElementById('socialCanvas');
const ctx = canvas.getContext('2d');

function generateImage() {
    // Background with gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, 630);
    gradient.addColorStop(0, '#0D3D2A');
    gradient.addColorStop(1, '#1A5C3E');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 1200, 630);
    
    // Kente pattern stripes
    ctx.fillStyle = '#C07D2A';
    ctx.fillRect(0, 0, 1200, 20);
    ctx.fillRect(0, 610, 1200, 20);
    
    ctx.fillStyle = '#8B1C1C';
    ctx.fillRect(0, 20, 1200, 15);
    ctx.fillRect(0, 595, 1200, 15);
    
    // Main content area
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.roundRect(60, 100, 1080, 430, 20);
    ctx.fill();
    
    // Logo/Brand area
    ctx.fillStyle = '#0D3D2A';
    ctx.font = 'bold 48px Playfair Display';
    ctx.textAlign = 'center';
    ctx.fillText('TutorNoble', 600, 180);
    
    // Tagline
    ctx.fillStyle = '#C07D2A';
    ctx.font = '32px Playfair Display';
    ctx.fillText('Learn. Grow. Shine.', 600, 220);
    
    // Main message
    ctx.fillStyle = '#1A1208';
    ctx.font = '24px Plus Jakarta Sans';
    ctx.fillText('Expert English & Science Tutoring', 600, 280);
    ctx.fillText('for JHS 1–3 Students in Ghana', 600, 310);
    
    // Features
    ctx.font = '20px Plus Jakarta Sans';
    ctx.fillStyle = '#4A3728';
    ctx.fillText('🌐 Online Everywhere | 📍 In-person Sunyani', 600, 360);
    ctx.fillText('💰 From ₵15 per session | 📚 Professional Tutors', 600, 390);
    
    // Call to action
    ctx.fillStyle = '#0D3D2A';
    ctx.font = 'bold 28px Plus Jakarta Sans';
    ctx.fillText('Book Your Session Today!', 600, 450);
    
    // Website
    ctx.fillStyle = '#C07D2A';
    ctx.font = '20px Plus Jakarta Sans';
    ctx.fillText('tutor-noble.netlify.app', 600, 490);
    
    // Decorative elements
    ctx.fillStyle = '#C07D2A';
    ctx.beginPath();
    ctx.arc(100, 315, 40, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#F5DFA8';
    ctx.beginPath();
    ctx.arc(100, 315, 30, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#0D3D2A';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('TN', 100, 325);
    
    // Right side decoration
    ctx.fillStyle = '#C07D2A';
    ctx.beginPath();
    ctx.arc(1100, 315, 40, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#F5DFA8';
    ctx.beginPath();
    ctx.arc(1100, 315, 30, 0, Math.PI * 2);
    ctx.fill();
    
    // Graduation cap icon
    ctx.fillStyle = '#0D3D2A';
    ctx.font = '30px Arial';
    ctx.fillText('🎓', 1100, 325);
}

function downloadImage() {
    const link = document.createElement('a');
    link.download = 'social-image.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click();
}

// Add roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
        if (width < 2 * radius) radius = width / 2;
        if (height < 2 * radius) radius = height / 2;
        this.beginPath();
        this.moveTo(x + radius, y);
        this.arcTo(x + width, y, x + width, y + height, radius);
        this.arcTo(x + width, y + height, x, y + height, radius);
        this.arcTo(x, y + height, x, y, radius);
        this.arcTo(x, y, x + width, y, radius);
        this.closePath();
        return this;
    };
}

// Generate on load
window.onload = generateImage;
</script>
</body>
</html>
